<script>
function checkMobileMatch() {
  let score = 0;
  const selects = document.querySelectorAll('.mobile-match select');

  selects.forEach(select => {
    select.classList.remove('correct', 'incorrect');

    if (select.value === select.dataset.answer) {
      score++;
      select.classList.add('correct');
    } else {
      select.classList.add('incorrect');
    }
  });

  document.getElementById('mobile-results').innerHTML =
    `You answered <strong>${score} out of ${selects.length}</strong> correctly.`;
}
</script>
